name: Generate Snake Game

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: Platane/snk@v3.5.0
        with:
          github_user_name: sinister71

          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark

          color_snake: "#00E6DE"

          color_dots: |
            #01311F
            #034525
            #0F6D31
            #00C647
            #15C755

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
